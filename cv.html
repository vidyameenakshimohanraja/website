<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:#fff;color:#000;
  min-height:100vh;display:flex;flex-direction:column;
}

nav{text-align:center;padding:36px 0 0;}
nav a{
  font-family:'EB Garamond',serif;
  font-size:17px;letter-spacing:0.2em;
  text-transform:uppercase;color:#000;
  text-decoration:none;margin:0 36px;
}
nav a{
  padding:5px 14px;
  border-radius:20px;
  transition:background .2s, color .2s;
  text-decoration:none !important;
}
nav a:hover{
  background:#000;
  color:#fff;
  text-decoration:none !important;
}

.page{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:60px 40px 100px;text-align:center;
}

.label{
  font-family:'EB Garamond',serif;
  font-size:11px;letter-spacing:0.3em;
  text-transform:uppercase;color:#000;
  margin-bottom:24px;display:block;
}

.cv-title{
  font-family:'EB Garamond',serif;
  font-size:clamp(28px,5vw,52px);
  font-weight:400;color:#000;
  margin-bottom:14px;line-height:1.2;
}

.cv-sub{
  font-family:'EB Garamond',serif;
  font-size:clamp(15px,2vw,18px);
  font-style:italic;color:#000;
  margin-bottom:48px;line-height:1.8;
}

.download-btn{
  display:inline-block;
  font-family:'EB Garamond',serif;
  font-size:clamp(13px,1.5vw,15px);
  letter-spacing:0.2em;text-transform:uppercase;
  color:#000;text-decoration:none;
  border:1px solid #000;
  padding:16px 40px;
  transition:background .2s,color .2s;
}
.download-btn:hover{background:#000;color:#fff;}

.note{
  font-family:'EB Garamond',serif;
  font-size:13px;color:#000;
  margin-top:20px;font-style:italic;opacity:0.5;
}

/* TABLET */
@media (max-width:768px){
  nav a{margin:0 20px;font-size:15px;}
  .page{padding:48px 28px 80px;}
}

/* MOBILE */
@media (max-width:480px){
  nav{padding:24px 0 0;}
  nav a{margin:0 12px;font-size:14px;letter-spacing:0.12em;}
  .page{padding:40px 20px 60px;}
