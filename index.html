<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vidya Meenakshi</title>
<link href="https://fonts.googleapis.com/css2?family=Homemade+Apple&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{height:100%}
body{
  background:#fff;color:#000;
  min-height:100vh;
  min-height:100dvh;
  display:flex;flex-direction:column;
  font-family:'EB Garamond',serif;
}

nav{
  text-align:center;
  padding:28px 40px 0;
  flex-shrink:0;
}
nav a{
  font-family:'EB Garamond',serif;
  font-size:14px;letter-spacing:0.2em;
  text-transform:uppercase;color:#000;
  text-decoration:none;
  margin:0 clamp(12px,3vw,36px);
  padding:5px 14px;
  border-radius:20px;
  transition:background .2s, color .2s;
  display:inline-block;
}
nav a:hover{
  background:#000;
  color:#fff;
  text-decoration:none;
}

.main{
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:20px 40px;
  /* leave room for fixed bottom bar */
  padding-bottom:80px;
}

.name{
  font-family:'Homemade Apple',cursive;
  font-size:clamp(30px,5vw,64px);
  color:#000;line-height:1.3;
  font-weight:400;text-align:center;
  margin-bottom:16px;
  cursor:default;
  transition:filter .4s ease;
}
.name.glowing{
  filter:drop-shadow(0 0 6px rgba(0,0,0,0.35)) drop-shadow(0 0 14px rgba(0,0,0,0.2)) drop-shadow(0 0 28px rgba(0,0,0,0.1));
}

.description{
  font-family:'EB Garamond',serif;
  font-size:clamp(15px,2vw,19px);
  color:#000;text-align:center;
  font-style:italic;margin-bottom:40px;
  letter-spacing:0.04em;
}

.icons{
  display:flex;
  gap:clamp(24px,6vw,64px);
  align-items:flex-start;
  justify-content:center;
  flex-wrap:wrap;
}

.icon-link{
  display:flex;flex-direction:column;
  align-items:center;gap:10px;
  text-decoration:none;color:#000;
}
.icon-link img{
  width:clamp(60px,9vw,105px);
  height:clamp(60px,9vw,105px);
  object-fit:contain;
  transition:transform .2s, filter .3s;
}
.icon-link:hover img{transform:translateY(-5px);}
.icon-link.glowing img{
  filter:drop-shadow(0 0 8px rgba(0,0,0,0.45)) drop-shadow(0 0 18px rgba(0,0,0,0.2));
}
.icon-label{
  font-size:clamp(12px,1.5vw,15px);
  letter-spacing:0.18em;
  text-transform:uppercase;color:#000;
}

/* Bottom bar — fixed so always visible */
.bottom-bar{
  position:fixed;
  bottom:0;left:0;right:0;
  display:flex;justify-content:space-between;
  align-items:center;
  padding:12px 40px 20px;
  background:linear-gradient(transparent, rgba(255,255,255,0.95) 40%);
  pointer-events:none;
}
.corner-link{
  display:flex;align-items:center;
  text-decoration:none;transition:opacity .2s;
  pointer-events:all;
}
.corner-link:hover{opacity:0.7;}
.mail-link:hover svg{filter:drop-shadow(0 0 6px rgba(245,197,24,0.8)) drop-shadow(0 0 14px rgba(245,197,24,0.4));}
.linkedin-link:hover svg{filter:drop-shadow(0 0 6px rgba(10,102,194,0.8)) drop-shadow(0 0 14px rgba(10,102,194,0.4));}
.corner-link svg{transition:filter .3s ease;}
.corner-link svg{width:34px;height:34px;}
.mail-link{color:#F5C518;}
.linkedin-link{color:#0A66C2;}

/* TABLET */
@media(max-width:768px){
  nav{padding:20px 24px 0;}
  nav a{margin:0 14px;font-size:12px;}
  .main{padding:16px 28px 80px;}
  .description{margin-bottom:28px;}
  .bottom-bar{padding:10px 28px 16px;}
  .corner-link svg{width:28px;height:28px;}
}

/* MOBILE PORTRAIT */
@media(max-width:480px){
  nav{padding:16px 16px 0;}
  nav a{margin:0 8px;font-size:11px;letter-spacing:0.12em;}
  .main{padding:12px 20px 72px;}
  .name{margin-bottom:12px;}
  .description{margin-bottom:24px;}
  .icons{gap:20px;}
  .bottom-bar{padding:8px 20px 14px;}
  .corner-link svg{width:26px;height:26px;}
}

/* VERY SMALL SCREENS */
@media(max-width:360px){
  nav a{margin:0 6px;font-size:10px;}
  .icon-link img{width:52px;height:52px;}
  .icons{gap:16px;}
}
</style>
</head>
<body>

<nav>
  <a href="lately.html">Lately</a>
  <a href="writing.html">Writing</a>
  <a href="create.html">Create</a>
</nav>

<main class="main">
  <h1 class="name">Vidya Meenakshi</h1>
  <p class="description">Writer. Strategist. Occasional poet.</p>
  <div class="icons">
    <a href="about.html" class="icon-link">
      <img src="About_Icon.png" alt="About">
      <span class="icon-label">About</span>
    </a>
    <a href="work.html" class="icon-link">
      <img src="Work_Icon.png" alt="Work">
      <span class="icon-label">Work</span>
    </a>
    <a href="cv.html" class="icon-link">
      <img src="CV_Icon.png" alt="CV">
      <span class="icon-label">CV</span>
    </a>
  </div>
</main>

<div class="bottom-bar">
  <a href="mailto:vidyameenakshimohanraja@gmail.com" class="corner-link mail-link" title="Email">
    <svg viewBox="0 0 24 24" fill="currentColor" stroke="none">
      <rect x="2" y="4" width="20" height="16" rx="2"/>
      <path d="M2 7l10 7 10-7" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </a>
  <a href="https://linkedin.com/in/vidyameenakshimr" target="_blank" class="corner-link linkedin-link" title="LinkedIn">
    <svg viewBox="0 0 24 24" fill="currentColor">
      <path d="M4.98 3.5C4.98 4.88 3.88 6 2.5 6S0 4.88 0 3.5 1.12 1 2.5 1s2.48 1.12 2.48 2.5zM0 8h5v16H0V8zm7.5 0H12v2.2h.07C12.67 9.08 14.19 8 16.38 8 21 8 22 11.15 22 15.13V24h-5v-7.9c0-1.88-.03-4.3-2.62-4.3-2.63 0-3.03 2.05-3.03 4.17V24H7.5V8z"/>
    </svg>
  </a>
</div>

<script>
// Name glow — toggles on click
document.querySelector('.name').addEventListener('click', function() {
  this.classList.toggle('glowing');
});

// Icon glow — toggles on click, clears others
document.querySelectorAll('.icon-link').forEach(function(link) {
  link.addEventListener('click', function(e) {
    e.preventDefault();
    const href = this.getAttribute('href');
    const wasGlowing = this.classList.contains('glowing');
    document.querySelectorAll('.icon-link').forEach(l => l.classList.remove('glowing'));
    if (!wasGlowing) {
      this.classList.add('glowing');
    }
    // Navigate after brief glow
    setTimeout(function(){ window.location.href = href; }, 320);
  });
});
</script>
</body>
</html>
