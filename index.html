<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vidya Meenakshi</title>
<link href="https://fonts.googleapis.com/css2?family=Homemade+Apple&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{height:100%}
body{
  background:#fff;color:#000;
  min-height:100vh;
  min-height:100dvh;
  display:flex;flex-direction:column;
  font-family:'EB Garamond',serif;
}

nav{
  text-align:center;
  padding:28px 40px 0;
  flex-shrink:0;
}
nav a{
  font-family:'EB Garamond',serif;
  font-size:14px;letter-spacing:0.2em;
  text-transform:uppercase;color:#000;
  text-decoration:none;
  margin:0 clamp(12px,3vw,36px);
  padding:5px 14px;
  border-radius:20px;
  transition:background .2s, color .2s;
  display:inline-block;
}
nav a:hover{
  background:#000;
  color:#fff;
  text-decoration:none;
}

.main{
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:20px 40px;
  /* leave room for fixed bottom bar */
  padding-bottom:80px;
}

.name{
  font-family:'Homemade Apple',cursive;
  font-size:clamp(30px,5vw,64px);
  color:#000;line-height:1.3;
  font-weight:400;text-align:center;
  margin-bottom:16px;
  cursor:default;
  transition:filter .35s ease;
}
.name:hover{
  filter:
    drop-shadow(0 0 5px rgba(232,115,154,0.45))
    drop-shadow(0 0 12px rgba(232,115,154,0.2));
}

/* Glitter particles */
@keyframes glitter-spin {
  0%   { transform: rotate(var(--start)) translateX(var(--r)) scale(0.6); opacity:0; }
  15%  { opacity:1; }
  85%  { opacity:1; }
  100% { transform: rotate(var(--end))   translateX(var(--r)) scale(0.6); opacity:0; }
}
.glitter-ring {
  position:fixed;
  pointer-events:none;
  z-index:9998;
}
.glitter-dot {
  position:absolute;
  border-radius:50%;
  animation: glitter-spin var(--dur) linear infinite;
  transform-origin: 0 0;
}

/* Sparkle burst — fly in then stay and bob */
@keyframes sparkle-fly {
  0%   { transform:translate(0,0) scale(0.3); opacity:0; }
  25%  { opacity:1; }
  100% { transform:translate(var(--dx),var(--dy)) scale(1); opacity:1; }
}
@keyframes sparkle-live {
  0%   { margin-top:0px;  opacity:1;    }
  15%  { margin-top:-4px; opacity:0.7;  }
  30%  { margin-top:-8px; opacity:1;    }
  50%  { margin-top:-5px; opacity:0.65; }
  70%  { margin-top:-9px; opacity:1;    }
  85%  { margin-top:-3px; opacity:0.75; }
  100% { margin-top:0px;  opacity:1;    }
}
@keyframes hey-appear {
  0%   { opacity:0; transform:translateY(8px); }
  100% { opacity:1; transform:translateY(-22px); }
}
@keyframes sparkle-fade-out {
  0%   { opacity:1; }
  100% { opacity:0; }
}
.sparkle-wrap{
  position:fixed;pointer-events:none;z-index:9999;
  top:0;left:0;width:100%;height:100%;
}
.sparkle-item{
  position:absolute;
  font-size:18px;line-height:1;
  will-change:transform;
  animation:
    sparkle-fly 0.55s cubic-bezier(.2,.8,.3,1) forwards,
    sparkle-live 1.8s ease-in-out 0.55s infinite;
}
.sparkle-wrap.leaving .sparkle-item,
.sparkle-wrap.leaving .hey-text{
  animation:sparkle-fade-out 0.3s ease-out forwards !important;
}
.hey-text{
  position:fixed;
  left:50%;
  transform:translateX(-50%);
  font-family:'EB Garamond',serif;
  font-style:italic;
  font-weight:700;
  font-size:16px;
  color:#e8739a;
  text-align:center;
  max-width:calc(100vw - 48px);
  line-height:1.6;
  animation:hey-appear 0.5s ease-out 0.15s forwards;
  opacity:0;
  pointer-events:none;
}

.description{
  font-family:'EB Garamond',serif;
  font-size:clamp(15px,2vw,19px);
  color:#000;text-align:center;
  font-style:italic;margin-bottom:40px;
  letter-spacing:0.04em;
}

.icons{
  display:flex;
  gap:clamp(24px,6vw,64px);
  align-items:flex-start;
  justify-content:center;
  flex-wrap:wrap;
}

.icon-link{
  display:flex;flex-direction:column;
  align-items:center;gap:10px;
  text-decoration:none;color:#000;
}
.icon-link img{
  width:clamp(60px,9vw,105px);
  height:clamp(60px,9vw,105px);
  object-fit:contain;
  transition:transform .25s, filter .3s;
}
.icon-link:hover img{
  transform:translateY(-6px);
}
.icon-label{
  font-size:clamp(12px,1.5vw,15px);
  letter-spacing:0.18em;
  text-transform:uppercase;color:#000;
}

/* Bottom bar — fixed so always visible */
.bottom-bar{
  position:fixed;
  bottom:0;left:0;right:0;
  display:flex;justify-content:space-between;
  align-items:center;
  padding:12px 40px 20px;
  background:linear-gradient(transparent, rgba(255,255,255,0.95) 40%);
  pointer-events:none;
}
.bottom-copy{
  font-family:'EB Garamond',serif;
  font-size:14px;
  font-weight:400;
  color:#000;
  pointer-events:none;
  text-align:center;
}
/* Hover tooltip for mail/linkedin */
.corner-tooltip{
  position:fixed;
  font-family:'EB Garamond',serif;
  font-size:13px;
  font-style:italic;
  color:#555;
  pointer-events:none;
  opacity:0;
  transition:opacity .2s;
  white-space:normal;
  max-width:220px;
  text-align:center;
  line-height:1.5;
  z-index:9999;
}
.corner-tooltip.visible{ opacity:1; }
.corner-link{
  display:flex;align-items:center;
  text-decoration:none;transition:opacity .2s;
  pointer-events:all;
}
.corner-link:hover{opacity:0.7;}
.mail-link:hover svg{filter:drop-shadow(0 0 6px rgba(245,197,24,0.8)) drop-shadow(0 0 14px rgba(245,197,24,0.4));}
.linkedin-link:hover svg{filter:drop-shadow(0 0 6px rgba(10,102,194,0.8)) drop-shadow(0 0 14px rgba(10,102,194,0.4));}
.corner-link svg{transition:filter .3s ease;}
.corner-link svg{width:34px;height:34px;}
.mail-link{color:#F5C518;}
.linkedin-link{color:#0A66C2;}

/* TABLET */
@media(max-width:768px){
  nav{padding:20px 24px 0;}
  nav a{margin:0 14px;font-size:12px;}
  .main{padding:16px 28px 80px;}
  .description{margin-bottom:28px;}
  .bottom-bar{padding:10px 28px 16px;}
  .corner-link svg{width:28px;height:28px;}
}

/* MOBILE PORTRAIT */
@media(max-width:480px){
  nav{padding:16px 16px 0;}
  nav a{margin:0 8px;font-size:11px;letter-spacing:0.12em;}
  .main{padding:12px 20px 72px;}
  .name{margin-bottom:12px;}
  .description{margin-bottom:24px;}
  .icons{gap:20px;}
  .bottom-bar{padding:8px 20px 14px;}
  .corner-link svg{width:26px;height:26px;}
}

/* VERY SMALL SCREENS */
@media(max-width:360px){
  nav a{margin:0 6px;font-size:10px;}
  .icon-link img{width:52px;height:52px;}
  .icons{gap:16px;}
}
</style>
</head>
<body>

<nav>
  <a href="lately.html">Lately</a>
  <a href="writing.html">Writing</a>
  <a href="create.html">Create</a>
</nav>

<main class="main">
  <h1 class="name">Vidya Meenakshi</h1>
  <p class="description">Writer. Strategist. Occasional poet.</p>
  <div class="icons">
    <a href="about.html" class="icon-link">
      <img src="About_Icon.png" alt="About">
      <span class="icon-label">About</span>
    </a>
    <a href="work.html" class="icon-link">
      <img src="Work_Icon.png" alt="Work">
      <span class="icon-label">Work</span>
    </a>
    <a href="cv.html" class="icon-link">
      <img src="CV_Icon.png" alt="CV">
      <span class="icon-label">CV</span>
    </a>
  </div>
</main>

<div class="bottom-bar">
  <a href="mailto:vidyameenakshimohanraja@gmail.com" class="corner-link mail-link" title="Email">
    <svg viewBox="0 0 24 24" fill="currentColor" stroke="none">
      <rect x="2" y="4" width="20" height="16" rx="2"/>
      <path d="M2 7l10 7 10-7" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </a>
  <span class="bottom-copy">© 2026 Vidya Meenakshi. All rights reserved.</span>
  <a href="https://linkedin.com/in/vidyameenakshimr" target="_blank" class="corner-link linkedin-link" title="LinkedIn">
    <svg viewBox="0 0 24 24" fill="currentColor">
      <path d="M4.98 3.5C4.98 4.88 3.88 6 2.5 6S0 4.88 0 3.5 1.12 1 2.5 1s2.48 1.12 2.48 2.5zM0 8h5v16H0V8zm7.5 0H12v2.2h.07C12.67 9.08 14.19 8 16.38 8 21 8 22 11.15 22 15.13V24h-5v-7.9c0-1.88-.03-4.3-2.62-4.3-2.63 0-3.03 2.05-3.03 4.17V24H7.5V8z"/>
    </svg>
  </a>
</div>
<div class="corner-tooltip" id="mailTooltip"></div>
<div class="corner-tooltip" id="linkedinTooltip">See you on the other side.</div>

<script>
// ── NAME SPARKLE & CYCLING TEXT ──────────────────────────
const SPARKLES = [
  {e:'✨', dx:-130, dy:-120},
  {e:'⭐', dx:-70,  dy:-165},
  {e:'✨', dx:0,    dy:-180},
  {e:'🌸', dx:75,   dy:-165},
  {e:'✨', dx:140,  dy:-120},
  {e:'🎉', dx:-100, dy:-85},
  {e:'⭐', dx:110,  dy:-85},
  {e:'✨', dx:40,   dy:-185},
];

const NAME_MSGS = [
  "Oh, hello there.",
  "Yup, that’s me.",
  "Still here?",
  "Is… is there something on my face?",
  "We’ve been hovering for a while. Should we get coffee?",
  "I’m calling the cursor police.",
  "Oh, hello again.",
];
let nameIdx = 0;
let sparkleWrap = null;
let leaveTimer  = null;

function getNameMsg() {
  const msg = NAME_MSGS[nameIdx];
  nameIdx = nameIdx === 6 ? 1 : nameIdx + 1;
  return msg;
}

document.querySelector('.name').addEventListener('mouseenter', function() {
  clearTimeout(leaveTimer);
  if (sparkleWrap) return;

  const rect = this.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top  + rect.height / 2;

  sparkleWrap = document.createElement('div');
  sparkleWrap.className = 'sparkle-wrap';

  SPARKLES.forEach(function(s) {
    const el = document.createElement('span');
    el.className = 'sparkle-item';
    el.textContent = s.e;
    el.style.left = cx + 'px';
    el.style.top  = cy + 'px';
    el.style.setProperty('--dx', s.dx + 'px');
    el.style.setProperty('--dy', s.dy + 'px');
    el.style.animationDelay    = (Math.random()*0.1)+'s';
    el.style.animationDuration = '0.55s,'+(1.5+Math.random()*0.6)+'s';
    el.style.fontSize = (14+Math.random()*9)+'px';
    sparkleWrap.appendChild(el);
  });

  const hey = document.createElement('span');
  hey.className = 'hey-text';
  hey.textContent = getNameMsg();
  hey.style.top = (cy - 115) + 'px';
  sparkleWrap.appendChild(hey);

  document.body.appendChild(sparkleWrap);
});

document.querySelector('.name').addEventListener('mouseleave', function() {
  if (!sparkleWrap) return;
  sparkleWrap.classList.add('leaving');
  const wrap = sparkleWrap;
  sparkleWrap = null;
  clearTimeout(leaveTimer);
  leaveTimer = setTimeout(function(){ wrap.remove(); }, 320);
});

// Mobile tap
let touchDismiss = null;
document.querySelector('.name').addEventListener('touchstart', function(e) {
  e.preventDefault();
  clearTimeout(touchDismiss);
  this.dispatchEvent(new Event('mouseenter'));
  touchDismiss = setTimeout(function() {
    if (!sparkleWrap) return;
    sparkleWrap.classList.add('leaving');
    const wrap = sparkleWrap; sparkleWrap = null;
    setTimeout(function(){ wrap.remove(); }, 320);
  }, 3000);
}, { passive:false });

// ── MAIL CYCLING TOOLTIP ──────────────────────────────────
const MAIL_MSGS = [
  "Send me a message!",
  "Go ahead, say hi.",
  "….",
  "Is it the ‘Subject’ line? It’s the ‘Subject’ line, isn’t it?",
];
let mailIdx = 0;
const mailEl    = document.querySelector('.mail-link');
const mailTip   = document.getElementById('mailTooltip');
const mailRect  = () => mailEl.getBoundingClientRect();

mailEl.addEventListener('mouseenter', function() {
  mailTip.textContent = MAIL_MSGS[mailIdx];
  mailIdx = (mailIdx + 1) % MAIL_MSGS.length;
  const r = mailRect();
  mailTip.style.left   = '16px';
  mailTip.style.transform = 'none';
  mailTip.style.top    = (r.top - 48) + 'px';
  mailTip.style.bottom = 'auto';
  mailTip.classList.add('visible');
});
mailEl.addEventListener('mouseleave', function() {
  mailTip.classList.remove('visible');
});

// ── LINKEDIN TOOLTIP ──────────────────────────────────────
const liEl  = document.querySelector('.linkedin-link');
const liTip = document.getElementById('linkedinTooltip');
liEl.addEventListener('mouseenter', function() {
  const r = liEl.getBoundingClientRect();
  liTip.style.right  = '16px';
  liTip.style.left   = 'auto';
  liTip.style.transform = 'none';
  liTip.style.textAlign = 'right';
  liTip.style.top    = (r.top - 48) + 'px';
  liTip.style.bottom = 'auto';
  liTip.classList.add('visible');
});
liEl.addEventListener('mouseleave', function() {
  liTip.classList.remove('visible');
});
</script>
</body>
</html>
